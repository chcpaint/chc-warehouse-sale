<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHC Paint — Token Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">
  <div class="max-w-4xl mx-auto p-6">
    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-2xl font-bold text-white">One-Time Access Tokens</h1>
        <p class="text-slate-400 text-sm mt-1">Generate temporary passwords for customers</p>
      </div>
      <a href="/admin" class="text-orange-400 hover:text-orange-300 text-sm">&larr; Back to Dashboard</a>
    </div>

    <!-- Not Logged In -->
    <div id="loginSection" class="bg-slate-800 rounded-xl p-6 mb-6">
      <p class="text-slate-300 mb-4">Log in with your admin credentials to manage tokens.</p>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
        <div>
          <label class="block text-sm text-slate-400 mb-1">Email</label>
          <input type="email" id="loginEmail" placeholder="admin@chcpaint.com"
            class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white focus:ring-2 focus:ring-orange-500 focus:outline-none">
        </div>
        <div>
          <label class="block text-sm text-slate-400 mb-1">Password</label>
          <input type="password" id="loginPassword" placeholder="Password"
            class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white focus:ring-2 focus:ring-orange-500 focus:outline-none">
        </div>
      </div>
      <button onclick="adminLogin()" class="px-6 py-2 bg-orange-500 hover:bg-orange-600 text-white rounded-lg font-medium transition">
        Log In
      </button>
      <p id="loginError" class="text-red-400 text-sm mt-2 hidden"></p>
    </div>

    <!-- Token Manager (hidden until logged in) -->
    <div id="tokenManager" class="hidden">

      <!-- Generate Token Form -->
      <div class="bg-slate-800 rounded-xl p-6 mb-6">
        <h2 class="text-lg font-semibold text-white mb-4">Generate New Token</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
          <div>
            <label class="block text-sm text-slate-400 mb-1">Customer Name <span class="text-slate-600">(optional)</span></label>
            <input type="text" id="customerName" placeholder="John Smith"
              class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white focus:ring-2 focus:ring-orange-500 focus:outline-none">
          </div>
          <div>
            <label class="block text-sm text-slate-400 mb-1">Customer Email <span class="text-slate-600">(optional)</span></label>
            <input type="email" id="customerEmail" placeholder="john@example.com"
              class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white focus:ring-2 focus:ring-orange-500 focus:outline-none">
          </div>
          <div>
            <label class="block text-sm text-slate-400 mb-1">Expires In</label>
            <select id="expiresHours" class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white focus:ring-2 focus:ring-orange-500 focus:outline-none">
              <option value="24">24 hours (1 day)</option>
              <option value="72" selected>72 hours (3 days)</option>
              <option value="168">168 hours (1 week)</option>
              <option value="720">720 hours (30 days)</option>
            </select>
          </div>
          <div>
            <label class="block text-sm text-slate-400 mb-1">Notes <span class="text-slate-600">(optional)</span></label>
            <input type="text" id="notes" placeholder="Trade show lead, referral, etc."
              class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white focus:ring-2 focus:ring-orange-500 focus:outline-none">
          </div>
        </div>
        <button onclick="generateToken()" class="px-6 py-2 bg-orange-500 hover:bg-orange-600 text-white rounded-lg font-medium transition">
          Generate Token
        </button>

        <!-- Generated Token Display -->
        <div id="tokenResult" class="hidden mt-4 p-4 bg-green-900/30 border border-green-700 rounded-lg">
          <p class="text-sm text-green-400 mb-1">Token generated successfully!</p>
          <p class="text-3xl font-mono font-bold text-green-300 tracking-wider" id="generatedToken"></p>
          <p class="text-sm text-slate-400 mt-2">Expires: <span id="tokenExpiry" class="text-slate-300"></span></p>
          <button onclick="copyToken()" class="mt-3 px-4 py-2 bg-green-700 hover:bg-green-600 text-white rounded-lg text-sm transition">
            Copy Token
          </button>
        </div>
      </div>

      <!-- Token List -->
      <div class="bg-slate-800 rounded-xl p-6">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-lg font-semibold text-white">All Tokens</h2>
          <button onclick="loadTokens()" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-slate-300 rounded-lg text-sm transition">
            Refresh
          </button>
        </div>
        <div id="tokenList" class="space-y-3">
          <p class="text-slate-500 text-sm">Loading tokens...</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    let authToken = localStorage.getItem('chc_admin_token') || null;

    // Check if already logged in
    if (authToken) {
      checkAuth();
    }

    async function adminLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errorEl = document.getElementById('loginError');
      errorEl.classList.add('hidden');

      try {
        const response = await fetch('/api/admin/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await response.json();

        if (data.token) {
          authToken = data.token;
          localStorage.setItem('chc_admin_token', authToken);
          showTokenManager();
        } else {
          errorEl.textContent = data.error || 'Login failed';
          errorEl.classList.remove('hidden');
        }
      } catch (e) {
        errorEl.textContent = 'Connection error';
        errorEl.classList.remove('hidden');
      }
    }

    async function checkAuth() {
      try {
        const response = await fetch('/api/admin/auth/me', {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });
        if (response.ok) {
          showTokenManager();
        } else {
          authToken = null;
          localStorage.removeItem('chc_admin_token');
        }
      } catch (e) {
        authToken = null;
        localStorage.removeItem('chc_admin_token');
      }
    }

    function showTokenManager() {
      document.getElementById('loginSection').classList.add('hidden');
      document.getElementById('tokenManager').classList.remove('hidden');
      loadTokens();
    }

    function headers() {
      return {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${authToken}`
      };
    }

    async function generateToken() {
      try {
        const response = await fetch('/api/admin/tokens/generate', {
          method: 'POST',
          headers: headers(),
          body: JSON.stringify({
            customerName: document.getElementById('customerName').value || null,
            customerEmail: document.getElementById('customerEmail').value || null,
            expiresHours: parseInt(document.getElementById('expiresHours').value),
            notes: document.getElementById('notes').value || null
          })
        });

        const data = await response.json();

        if (data.success) {
          document.getElementById('generatedToken').textContent = data.token;
          document.getElementById('tokenExpiry').textContent = new Date(data.expiresAt).toLocaleString();
          document.getElementById('tokenResult').classList.remove('hidden');
          // Clear form
          document.getElementById('customerName').value = '';
          document.getElementById('customerEmail').value = '';
          document.getElementById('notes').value = '';
          loadTokens();
        } else {
          alert('Error: ' + (data.error || 'Failed to generate token'));
        }
      } catch (e) {
        alert('Connection error');
      }
    }

    function copyToken() {
      const token = document.getElementById('generatedToken').textContent;
      navigator.clipboard.writeText(token).then(() => {
        const btn = event.target;
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy Token', 2000);
      });
    }

    async function loadTokens() {
      try {
        const response = await fetch('/api/admin/tokens', {
          headers: headers()
        });
        const data = await response.json();

        if (data.tokens) {
          const list = document.getElementById('tokenList');
          if (data.tokens.length === 0) {
            list.innerHTML = '<p class="text-slate-500 text-sm">No tokens generated yet.</p>';
            return;
          }
          list.innerHTML = data.tokens.map(t => `
            <div class="p-4 rounded-lg border ${getStatusStyle(t.status)}">
              <div class="flex justify-between items-start">
                <div>
                  <p class="font-mono font-bold text-lg">${t.token}</p>
                  <p class="text-sm text-slate-400">${t.customer_name || 'Anonymous'}${t.customer_email ? ' (' + t.customer_email + ')' : ''}</p>
                  <p class="text-xs text-slate-500 mt-1">Created: ${new Date(t.created_at).toLocaleString()}</p>
                  ${t.used_at ? '<p class="text-xs text-slate-500">Used: ' + new Date(t.used_at).toLocaleString() + '</p>' : ''}
                  ${t.notes ? '<p class="text-xs text-slate-600 italic mt-1">' + t.notes + '</p>' : ''}
                </div>
                <div class="text-right">
                  <span class="px-2 py-1 text-xs font-semibold rounded ${getStatusBadge(t.status)}">${t.status}</span>
                  ${t.status === 'ACTIVE' ? `<button onclick="revokeToken('${t.token}')" class="block mt-2 text-xs text-red-400 hover:text-red-300 cursor-pointer">Revoke</button>` : ''}
                </div>
              </div>
            </div>
          `).join('');
        }
      } catch (e) {
        document.getElementById('tokenList').innerHTML = '<p class="text-red-400 text-sm">Failed to load tokens.</p>';
      }
    }

    function getStatusStyle(status) {
      switch(status) {
        case 'ACTIVE': return 'bg-green-900/20 border-green-800';
        case 'USED': return 'bg-slate-800 border-slate-700';
        case 'EXPIRED': return 'bg-yellow-900/20 border-yellow-800';
        case 'REVOKED': return 'bg-red-900/20 border-red-800';
        default: return 'bg-slate-800 border-slate-700';
      }
    }

    function getStatusBadge(status) {
      switch(status) {
        case 'ACTIVE': return 'bg-green-800 text-green-200';
        case 'USED': return 'bg-slate-700 text-slate-300';
        case 'EXPIRED': return 'bg-yellow-800 text-yellow-200';
        case 'REVOKED': return 'bg-red-800 text-red-200';
        default: return 'bg-slate-700 text-slate-300';
      }
    }

    async function revokeToken(token) {
      if (!confirm('Revoke token ' + token + '?')) return;

      try {
        await fetch('/api/admin/tokens/revoke', {
          method: 'POST',
          headers: headers(),
          body: JSON.stringify({ token })
        });
        loadTokens();
      } catch (e) {
        alert('Failed to revoke token');
      }
    }
  </script>
</body>
</html>
